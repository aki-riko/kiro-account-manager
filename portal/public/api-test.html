<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 测试 - Kiro Account Manager</title>
  <link rel="icon" href="https://raw.githubusercontent.com/hj01857655/kiro-account-manager/main/src-tauri/icons/32x32.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#00d9ff', dark: '#0f0f23', card: '#16213e' } } }
    }
  </script>
  <style>
    .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(10px); }
    pre { background: #0f0f23; padding: 15px; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 300px; font-size: 12px; }
    textarea { font-family: 'Consolas', 'Monaco', monospace; }
  </style>
</head>
<body class="bg-dark text-gray-100 min-h-screen">
  <!-- 导航 -->
  <nav class="fixed top-0 w-full z-50 glass border-b border-white/10">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/" class="flex items-center gap-3">
          <img src="https://raw.githubusercontent.com/hj01857655/kiro-account-manager/main/src-tauri/icons/32x32.png" alt="Logo" class="w-8 h-8">
          <span class="font-bold text-lg">Kiro Account Manager</span>
        </a>
      </div>
      <div class="flex items-center gap-4">
        <a href="/#features" class="text-gray-400 hover:text-white transition">功能</a>
        <a href="/#download" class="text-gray-400 hover:text-white transition">下载</a>
        <a href="/tutorial.html" class="text-gray-400 hover:text-white transition">教程</a>
        <a href="/coffee.html" class="text-gray-400 hover:text-white transition">续杯</a>
        <a href="/api-test.html" class="text-primary">API 测试</a>
        <a href="https://kiro.dev/downloads" target="_blank" class="text-gray-400 hover:text-white transition">Kiro IDE</a>
      </div>
    </div>
  </nav>

  <main class="pt-24 pb-16 px-4">
    <div class="max-w-3xl mx-auto">
      <h1 class="text-3xl font-bold mb-8 text-center">🔧 API 测试</h1>
  
      <section class="glass rounded-2xl p-6 border border-white/10 mb-6">
        <h2 class="text-xl font-bold mb-4 text-primary">账号 JSON</h2>
        <textarea id="jsonInput" class="w-full h-48 p-4 bg-dark border border-white/20 rounded-xl text-sm resize-y focus:border-primary focus:outline-none" placeholder='{
  "accessToken": "...",
  "refreshToken": "...",
  "provider": "Google"
}

IdC 类型（BuilderId/Enterprise）需要额外字段：
{
  "accessToken": "...",
  "refreshToken": "...",
  "provider": "BuilderId",
  "clientId": "...",
  "clientSecret": "...",
  "region": "us-east-1"
}'></textarea>
        <p class="text-gray-500 text-xs mt-2">
          Social 类型 (Google/Github)：accessToken, refreshToken, provider<br>
          IdC 类型 (BuilderId/Enterprise)：accessToken, refreshToken, provider, clientId, clientSecret, region(可选)
        </p>
      </section>

      <section class="glass rounded-2xl p-6 border border-white/10 mb-6">
        <div class="flex flex-wrap gap-3">
          <button onclick="testUsage()" class="px-6 py-2 bg-primary text-dark font-bold rounded-lg hover:opacity-90 transition">获取配额</button>
          <button onclick="testRefresh()" class="px-6 py-2 bg-primary text-dark font-bold rounded-lg hover:opacity-90 transition">刷新 Token</button>
          <button onclick="formatJson()" class="px-6 py-2 bg-white/10 rounded-lg hover:bg-white/20 transition">格式化</button>
          <button onclick="clearAll()" class="px-6 py-2 bg-white/10 rounded-lg hover:bg-white/20 transition">清空</button>
        </div>
      </section>

      <section class="glass rounded-2xl p-6 border border-white/10">
        <h2 class="text-xl font-bold mb-4 text-primary">结果</h2>
        <pre id="result" class="text-gray-300">结果将显示在这里...</pre>
      </section>
    </div>
  </main>

  <footer class="py-6 px-4 border-t border-white/10 text-center text-gray-500 text-sm">
    <a href="/" class="hover:text-white">← 返回首页</a>
  </footer>

  <script>
    const $ = id => document.getElementById(id)

    function parseInput() {
      const text = $('jsonInput').value.trim()
      if (!text) throw new Error('请输入 JSON 数据')
      const data = JSON.parse(text)
      return Array.isArray(data) ? data : [data]
    }

    function formatJson() {
      try {
        const data = JSON.parse($('jsonInput').value)
        $('jsonInput').value = JSON.stringify(data, null, 2)
      } catch (e) {
        $('result').className = 'text-red-400'
        $('result').textContent = 'JSON 格式错误: ' + e.message
      }
    }

    function clearAll() {
      $('jsonInput').value = ''
      $('result').textContent = '结果将显示在这里...'
      $('result').className = 'text-gray-300'
    }

    async function testUsage() {
      $('result').textContent = '请求中...'
      try {
        const accounts = parseInput()
        const results = []
        
        for (const acc of accounts) {
          const provider = acc.provider || acc.idp || 'Google'
          const accessToken = acc.accessToken || acc.access_token
          
          if (!accessToken) {
            results.push({ error: '缺少 accessToken', account: acc })
            continue
          }

          const isIdC = ['BuilderId', 'Enterprise', 'idc'].includes(provider)
          const body = { accessToken, authMethod: isIdC ? 'idc' : 'social' }
          if (!isIdC) body.idp = provider

          const res = await fetch('/api/usage', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          })
          const data = await res.json()
          results.push({ status: res.status, provider, authMethod: body.authMethod, data })
        }

        $('result').className = 'text-green-400'
        $('result').textContent = JSON.stringify(results, null, 2)
      } catch (e) {
        $('result').className = 'text-red-400'
        $('result').textContent = '错误: ' + e.message
      }
    }

    async function testRefresh() {
      $('result').textContent = '请求中...'
      try {
        const accounts = parseInput()
        const results = []
        
        for (const acc of accounts) {
          const provider = acc.provider || 'Google'
          const refreshToken = acc.refreshToken || acc.refresh_token
          const machineId = acc.machineId || acc.machine_id
          
          if (!refreshToken) {
            results.push({ error: '缺少 refreshToken', account: acc })
            continue
          }

          const isIdC = ['BuilderId', 'Enterprise', 'idc'].includes(provider)
          
          if (isIdC) {
            const clientId = acc.clientId || acc.client_id
            const clientSecret = acc.clientSecret || acc.client_secret
            const region = acc.region || 'us-east-1'
            
            if (!clientId || !clientSecret) {
              results.push({ error: 'IdC 类型需要 clientId 和 clientSecret', account: acc })
              continue
            }

            const res = await fetch('/api/refresh', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ refreshToken, authMethod: 'idc', clientId, clientSecret, region })
            })
            const data = await res.json()
            results.push({ status: res.status, provider, authMethod: 'idc', data })
          } else {
            const body = { refreshToken, authMethod: 'social' }
            if (machineId) body.machineId = machineId

            const res = await fetch('/api/refresh', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body)
            })
            const data = await res.json()
            results.push({ status: res.status, provider, authMethod: 'social', data })
          }
        }

        $('result').className = 'text-green-400'
        $('result').textContent = JSON.stringify(results, null, 2)
      } catch (e) {
        $('result').className = 'text-red-400'
        $('result').textContent = '错误: ' + e.message
      }
    }
  </script>
</body>
</html>
