name: Cleanup Failed Runs

on:
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 运行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    
    steps:
      - name: Delete failed and cancelled runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // 获取所有 workflow runs
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner,
              repo,
            });
            
            let totalDeleted = 0;
            
            for (const workflow of workflows.data.workflows) {
              let page = 1;
              let hasMore = true;
              
              while (hasMore) {
                const runs = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: workflow.id,
                  per_page: 100,
                  page: page,
                });
                
                if (runs.data.workflow_runs.length === 0) {
                  hasMore = false;
                  break;
                }
                
                for (const run of runs.data.workflow_runs) {
                  // 只删除失败或取消的 runs
                  if (run.conclusion === 'failure' || run.conclusion === 'cancelled') {
                    try {
                      await github.rest.actions.deleteWorkflowRun({
                        owner,
                        repo,
                        run_id: run.id,
                      });
                      console.log(`✓ Deleted ${run.conclusion} run #${run.id} from workflow "${workflow.name}"`);
                      totalDeleted++;
                    } catch (error) {
                      console.log(`✗ Failed to delete run #${run.id}: ${error.message}`);
                    }
                  }
                }
                
                page++;
                
                // 限制每个 workflow 最多处理 5 页，避免超时
                if (page > 5) {
                  hasMore = false;
                }
              }
            }
            
            console.log(`\n🎉 Total deleted: ${totalDeleted} runs`);
            core.summary.addHeading('Cleanup Summary');
            core.summary.addRaw(`Deleted ${totalDeleted} failed/cancelled workflow runs`);
            await core.summary.write();
