name: Build

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-2022
            target: ''
          - platform: windows-2022
            target: 'aarch64-pc-windows-msvc'
          - platform: windows-2022
            target: 'i686-pc-windows-msvc'
          - platform: macos-15-intel
            target: 'x86_64-apple-darwin'
          - platform: macos-latest
            target: 'aarch64-apple-darwin'
          - platform: ubuntu-22.04
            target: ''
          - platform: ubuntu-22.04-arm
            target: ''
          - platform: ubuntu-22.04
            target: 'armv7-unknown-linux-gnueabihf'
          - platform: ubuntu-22.04
            target: 'i686-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          key: ${{ matrix.platform }}-${{ matrix.target || 'default' }}
          shared-key: "build"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}

      - name: Install dependencies
        shell: bash
        run: bun install

      - name: Check frontend code
        shell: bash
        run: |
          echo "📦 Checking TypeScript types..."
          bun run typecheck || true
          
          echo "🎨 Checking code style..."
          bun run lint || true

      - name: Check Rust code
        shell: bash
        working-directory: src-tauri
        run: |
          echo "🦀 Checking Rust code..."
          cargo fmt --check || echo "⚠️ Rust formatting issues found"
          cargo clippy -- -D warnings || echo "⚠️ Clippy warnings found"

      - name: Run Rust tests
        shell: bash
        working-directory: src-tauri
        run: |
          echo "🧪 Running Rust tests..."
          cargo test --all-features || echo "⚠️ Some tests failed"

      - name: Build application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Linux AppImage 使用 gzip 压缩，兼容旧版 AppImageLauncher
          APPIMAGETOOL_COMP: ${{ startsWith(matrix.platform, 'ubuntu') && 'gzip' || '' }}
        with:
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
          # 不上传到 release
          tagName: ''
          releaseName: ''
          releaseBody: ''
          releaseDraft: false
          prerelease: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-${{ matrix.platform }}-${{ matrix.target || 'default' }}
          path: |
            src-tauri/target/release/bundle
          retention-days: 7

  build-summary:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ All builds completed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some builds failed. Please check the logs above." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Matrix" >> $GITHUB_STEP_SUMMARY
          echo "- Windows (x64)" >> $GITHUB_STEP_SUMMARY
          echo "- Windows (ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "- Windows (x86 32-bit)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS (Intel)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS (Apple Silicon)" >> $GITHUB_STEP_SUMMARY
          echo "- Linux (x64)" >> $GITHUB_STEP_SUMMARY
          echo "- Linux (ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "- Linux (ARMv7)" >> $GITHUB_STEP_SUMMARY
          echo "- Linux (x86 32-bit)" >> $GITHUB_STEP_SUMMARY
