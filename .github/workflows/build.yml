name: Build

on:
  push:
    branches:
      - main
      - dev
      - public
      - 'feature/**'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      platforms:
        description: '选择要构建的平台 (留空构建全部)'
        required: false
        type: choice
        default: 'all'
        options:
          - 'all'
          - 'windows'
          - 'macos'
          - 'linux'
      skip_tests:
        description: '跳过测试'
        required: false
        type: boolean
        default: false

jobs:
  build:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-2022
            target: ''
            artifact_name: 'kiro-account-manager-windows-x64'
          - platform: windows-2022
            target: 'aarch64-pc-windows-msvc'
            artifact_name: 'kiro-account-manager-windows-arm64'
          - platform: windows-2022
            target: 'i686-pc-windows-msvc'
            artifact_name: 'kiro-account-manager-windows-x86'
          - platform: macos-13
            target: 'x86_64-apple-darwin'
            artifact_name: 'kiro-account-manager-macos-intel'
          - platform: macos-latest
            target: 'aarch64-apple-darwin'
            artifact_name: 'kiro-account-manager-macos-arm64'
          - platform: ubuntu-22.04
            target: ''
            artifact_name: 'kiro-account-manager-linux-x64'
          - platform: ubuntu-22.04-arm
            target: ''
            artifact_name: 'kiro-account-manager-linux-arm64'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check if should run
        id: should_run
        run: |
          SHOULD_RUN="true"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PLATFORM="${{ matrix.platform }}"
            FILTER="${{ github.event.inputs.platforms }}"
            if [ "$FILTER" != "all" ]; then
              if [ "$FILTER" = "windows" ] && [[ ! "$PLATFORM" =~ ^windows ]]; then
                SHOULD_RUN="false"
              elif [ "$FILTER" = "macos" ] && [[ ! "$PLATFORM" =~ ^macos ]]; then
                SHOULD_RUN="false"
              elif [ "$FILTER" = "linux" ] && [[ ! "$PLATFORM" =~ ^ubuntu ]]; then
                SHOULD_RUN="false"
              fi
            fi
          fi
          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT
        shell: bash

      - name: Checkout
        if: steps.should_run.outputs.should_run == 'true'
        uses: actions/checkout@v5

      - name: Install NASM (Windows)
        if: steps.should_run.outputs.should_run == 'true' && startsWith(matrix.platform, 'windows')
        run: |
          choco install nasm -y
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Install Linux dependencies
        if: steps.should_run.outputs.should_run == 'true' && startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            lld \
            xdg-utils

      - name: Setup Node
        if: steps.should_run.outputs.should_run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Bun
        if: steps.should_run.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Rust cache
        if: steps.should_run.outputs.should_run == 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          key: ${{ matrix.platform }}-${{ matrix.target || 'default' }}
          shared-key: "build"

      - name: Install Rust stable
        if: steps.should_run.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}

      - name: Install dependencies
        if: steps.should_run.outputs.should_run == 'true'
        shell: bash
        run: bun install

      - name: Check frontend code
        if: steps.should_run.outputs.should_run == 'true'
        shell: bash
        run: |
          echo "📦 Checking TypeScript types..."
          bun run typecheck || true
          
          echo "🎨 Checking code style..."
          bun run lint || true

      - name: Check Rust code
        if: steps.should_run.outputs.should_run == 'true'
        shell: bash
        working-directory: src-tauri
        run: |
          echo "🦀 Checking Rust code..."
          cargo fmt --check || echo "⚠️ Rust formatting issues found"
          cargo clippy -- -D warnings || echo "⚠️ Clippy warnings found"

      - name: Run Rust tests
        if: steps.should_run.outputs.should_run == 'true' && github.event.inputs.skip_tests != 'true'
        shell: bash
        working-directory: src-tauri
        run: |
          echo "🧪 Running Rust tests..."
          cargo test --all-features || echo "⚠️ Some tests failed"

      - name: Build application
        id: build
        if: steps.should_run.outputs.should_run == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGETOOL_COMP: ${{ startsWith(matrix.platform, 'ubuntu') && 'gzip' || '' }}
        with:
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
          tagName: ''
          releaseName: ''
          releaseBody: ''
          releaseDraft: false
          prerelease: false

      - name: Upload build artifacts
        if: success() && steps.should_run.outputs.should_run == 'true' && steps.build.outcome == 'success'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle
          retention-days: 7
          if-no-files-found: warn

  build-summary:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ All builds completed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some builds failed. Please check the logs above." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Matrix" >> $GITHUB_STEP_SUMMARY
          echo "- Windows (x64)" >> $GITHUB_STEP_SUMMARY
          echo "- Windows (ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "- Windows (x86 32-bit)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS (Intel)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS (Apple Silicon)" >> $GITHUB_STEP_SUMMARY
          echo "- Linux (x64)" >> $GITHUB_STEP_SUMMARY
          echo "- Linux (ARM64)" >> $GITHUB_STEP_SUMMARY
