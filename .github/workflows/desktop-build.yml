name: Desktop Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/desktop-build.yml'
      - 'src/**'
      - 'src-tauri/**'
      - 'bun.lock'
      - 'package.json'
      - 'tauri.ci.conf.json'
      - 'tsconfig*.json'
      - 'vite.config.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate source
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install NASM
        shell: pwsh
        run: |
          choco install nasm -y
          "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: desktop-validate

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend tests
        run: bun test

      - name: Check TypeScript
        run: bun x tsc --noEmit

      - name: Build frontend
        run: bun run build

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --bin kiro-account-manager

  build:
    name: Build ${{ matrix.display_name }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: Windows x64
            platform: windows-2022
            rust_target: x86_64-pc-windows-msvc
            bundles: msi
            bundle_glob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            artifact_name: KiroAccountManager-windows-x64
          - display_name: macOS Intel
            platform: macos-15-intel
            rust_target: x86_64-apple-darwin
            bundles: dmg
            bundle_glob: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            artifact_name: KiroAccountManager-macos-intel
          - display_name: macOS Apple Silicon
            platform: macos-latest
            rust_target: aarch64-apple-darwin
            bundles: dmg
            bundle_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            artifact_name: KiroAccountManager-macos-arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install NASM
        if: startsWith(matrix.platform, 'windows')
        shell: pwsh
        run: |
          choco install nasm -y
          "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install create-dmg
        if: startsWith(matrix.platform, 'macos')
        run: brew install create-dmg

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.rust_target }}

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          key: ${{ matrix.rust_target }}
          shared-key: desktop-build

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build unsigned installer
        uses: tauri-apps/tauri-action@v0
        with:
          args: >-
            --ci
            --no-sign
            --config tauri.ci.conf.json
            --target ${{ matrix.rust_target }}
            --bundles ${{ matrix.bundles }}

      - name: Collect installer and checksum
        shell: pwsh
        run: |
          $files = @(Get-ChildItem -Path '${{ matrix.bundle_glob }}' -File)
          if ($files.Count -eq 0) {
            throw 'Build completed without the expected installer artifact'
          }

          $output = Join-Path 'artifacts' '${{ matrix.artifact_name }}'
          New-Item -ItemType Directory -Path $output -Force | Out-Null
          foreach ($file in $files) {
            Copy-Item -LiteralPath $file.FullName -Destination $output
          }

          $checksums = $files | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          }
          $checksums | Set-Content -LiteralPath (Join-Path $output 'SHA256SUMS.txt') -Encoding utf8

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.artifact_name }}
          retention-days: 30
          if-no-files-found: error
